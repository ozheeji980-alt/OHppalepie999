<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Near Pick | 내 주변 탐색</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/map.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app map-app">
        
        <!-- Sticky Top Filters -->
        <header class="map-header">
            <div class="filter-scroll">
                <button class="filter-chip filter-chip--active">
                    <span class="chip-icon">🔥</span> 전체 사용자
                </button>
                <button class="filter-chip bg-friend">
                    <span class="chip-icon">⭐</span> 친구 추천
                </button>
                <button class="filter-chip bg-influencer">
                    <span class="chip-icon">✨</span> 인플루언서 픽
                </button>
            </div>
        </header>

        <!-- Main Map Area (Fullscreen) -->
        <main class="map-view">
            <!-- Mock Map Background using CSS Gradient -->
            <div class="map-background"></div>

            <!-- Custom Map Pins -->
            
            <!-- Popular Pin -->
            <div class="map-pin pin-popular" style="top: 25%; left: 30%;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                </svg>
                <span class="pin-icon">🔥</span>
            </div>

            <!-- Friend Pin -->
            <div class="map-pin pin-friend" style="top: 45%; left: 60%;">
                <div class="pin-badge">2</div>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                </svg>
                <span class="pin-icon">⭐</span>
            </div>

            <!-- Influencer Pin -->
            <div class="map-pin pin-influencer" style="top: 55%; left: 20%;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                </svg>
                <span class="pin-icon">✨</span>
            </div>

            <!-- User Location Button -->
            <button class="btn-my-location">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2"></path>
                    <path d="M12 20v2"></path>
                    <path d="M22 12h-2"></path>
                    <path d="M4 12H2"></path>
                </svg>
            </button>

            <!-- Radar Feature -->
            <div class="radar-container" style="top: 30%; left: 70%;">
                <div class="radar-ping"></div>
                <div class="radar-ping delay-1"></div>
                <div class="radar-ping delay-2"></div>
                <!-- Radar Friend Avatar -->
                <div class="radar-avatar">
                    <img src="https://i.pravatar.cc/100?u=jiwoo" alt="지우">
                </div>
                <div class="radar-toast">근처에서 지우님이 장소를 저장했어요!</div>
            </div>

        </main>

        <!-- Floating Place Card -->
        <div class="floating-card-container">
            <article class="place-card">
                <div class="place-card__image" style="background: linear-gradient(135deg, #FFE8E5, #FFC9C2);"></div>
                <div class="place-card__content">
                    <div class="place-card__header">
                        <h3 class="place-card__title">을지로 미팅룸</h3>
                        <button class="btn-save-sm">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="place-card__meta">을지로 · 파스타 & 와인</p>
                    <div class="place-card__stats">
                        <span class="stat-item stat-star">⭐ 4.6</span>
                        <span class="stat-item stat-save">🔖 저장 2,301</span>
                    </div>
                    <!-- Friend Activity -->
                    <div class="place-card__friends">
                        <div class="friend-group">
                            <div class="friend-avatar" style="background-image: url('https://i.pravatar.cc/100?u=1')"></div>
                            <div class="friend-avatar" style="background-image: url('https://i.pravatar.cc/100?u=2')"></div>
                            <div class="friend-avatar" style="background-image: url('https://i.pravatar.cc/100?u=3')"></div>
                        </div>
                        <span class="friend-text">재현님 외 2명이 저장했어요</span>
                    </div>
                </div>
            </article>
        </div>

        <!-- 5-Item Bottom Navigation -->
        <nav class="bottom-tab-bar">
            <a href="home.html" class="tab-item">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="tab-label">홈</span>
            </a>
            <a href="index.html" class="tab-item tab-item--active">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line>
                </svg>
                <span class="tab-label">지도</span>
            </a>
            
            <div class="tab-item tab-fab-container">
                <button class="tab-fab">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>

            <a href="#" class="tab-item">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
                <span class="tab-label">저장</span>
            </a>
            <a href="#" class="tab-item">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="tab-label">나</span>
            </a>
        </nav>
    </div>
</body>
</html>
