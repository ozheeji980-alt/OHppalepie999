<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Near Pick | 온보딩</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/onboarding.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app onboarding-app">
        <header class="onboarding-header">
            <div class="logo">
                <img src="images/logo.png" alt="Near Pick Logo" class="app-logo">
            </div>
        </header>

        <main class="onboarding-slider">
            <!-- Slide 1: Discover -->
            <section class="slide" id="slide1">
                <div class="slide__image">
                    <div class="graphic-circle graphic-circle--friend">
                        <div class="avatar-stack">
                            <div class="avatar"></div>
                            <div class="avatar"></div>
                            <div class="avatar"></div>
                        </div>
                        <div class="floating-pin">⭐</div>
                    </div>
                </div>
                <div class="slide__content">
                    <h1 class="slide__title">친구가 저장한<br>진짜 장소를 발견하세요</h1>
                    <p class="slide__desc">광고 말고, 내 친구들이 직접 다녀와서<br>저장한 찐 맛집만 모아볼 수 있어요.</p>
                </div>
            </section>

            <!-- Slide 2: Explore -->
            <section class="slide" id="slide2">
                <div class="slide__image">
                    <div class="graphic-circle graphic-circle--popular">
                        <div class="hot-badge">HOT</div>
                        <div class="pulse-rings">
                            <div class="ring"></div>
                            <div class="ring"></div>
                        </div>
                        <div class="floating-pin">🔥</div>
                    </div>
                </div>
                <div class="slide__content">
                    <h1 class="slide__title">지금 가장 핫한<br>플레이스를 탐색해요</h1>
                    <p class="slide__desc">전체 사용자와 인플루언서들이<br>선정한 트렌디한 장소를 추천해드려요.</p>
                </div>
            </section>

            <!-- Slide 3: Stamp -->
            <section class="slide" id="slide3">
                <div class="slide__image">
                    <div class="graphic-circle graphic-circle--stamp">
                        <div class="stamp-pad">
                            <div class="stamp-icon">📍</div>
                        </div>
                        <div class="floating-pin">✅</div>
                    </div>
                </div>
                <div class="slide__content">
                    <h1 class="slide__title">내 위치에서 편리하게<br>발도장을 찍어보세요</h1>
                    <p class="slide__desc">방문한 장소에서 스탬프를 찍고<br>나만의 맛집 지도를 완성해나가는 즐거움!</p>
                </div>
            </section>
        </main>

        <footer class="onboarding-footer">
            <div class="onboarding-stepper">
                <div class="step step--active"></div>
                <div class="step"></div>
                <div class="step"></div>
            </div>
            <div class="onboarding-actions">
                <a href="login.html" class="btn-start">시작하기</a>
            </div>
        </footer>
    </div>

    <script>
        const slider = document.querySelector('.onboarding-slider');
        const steps = document.querySelectorAll('.step');

        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.clientWidth);
            steps.forEach((step, i) => {
                step.classList.toggle('step--active', i === index);
            });
        });
    </script>
</body>
</html>
