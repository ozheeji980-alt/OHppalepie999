<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Savamap - Discovery</title>
    <link rel="stylesheet" href="css/discovery.css">
</head>
<body>
    <div class="app-container">
        <!-- Top Section -->
        <header class="header">
            <div class="header__content">
                <div class="search-bar">
                    <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-bar__input" placeholder="지역 또는 맛집 검색">
                </div>
                <div class="filter-chips">
                    <div class="chip chip--all">🔥 전체 사용자</div>
                    <div class="chip chip--friend chip--active-friend">⭐ 친구 추천</div>
                    <div class="chip chip--influencer">📈 인플루언서 픽</div>
                    <div class="chip chip--context">❤️ 데이트</div>
                </div>
            </div>
        </header>

        <!-- Main Map Section -->
        <main class="map-view">
            <!-- Mock Map Background -->
            <img src="/Users/admin/.gemini/antigravity/brain/e2f2fde7-5a18-46e6-b7b2-c115122305ae/map_background_mockup_1773304515489.png" alt="Map Background" class="map-background">

            <!-- Map Pins -->
            <!-- Mango Pin (Popular) -->
            <div class="pin pin--mango" style="top: 25%; left: 65%;">
                <div class="pin__icon-container">
                    <svg viewBox="0 0 24 24" width="36" height="44" fill="currentColor">
                        <path d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 16 1-3 8-10.75 8-16 0-4.42-3.58-8-8-8z"/>
                        <circle cx="12" cy="8" r="3" fill="white"/>
                        <text x="12" y="10" font-size="6" text-anchor="middle" fill="orange" style="font-weight: bold;">🔥</text>
                    </svg>
                </div>
            </div>

            <!-- Coral Pin (Friend) -->
            <div class="pin pin--coral" style="top: 45%; left: 35%;">
                <div class="pin__badge">12</div>
                <div class="pin__icon-container">
                    <svg viewBox="0 0 24 24" width="36" height="44" fill="currentColor">
                        <path d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 16 1-3 8-10.75 8-16 0-4.42-3.58-8-8-8z"/>
                        <text x="12" y="11" font-size="8" text-anchor="middle" fill="white">⭐</text>
                    </svg>
                </div>
            </div>

            <!-- Purple Pin (Influencer) -->
            <div class="pin pin--purple" style="top: 15%; left: 25%;">
                <div class="pin__icon-container">
                    <svg viewBox="0 0 24 24" width="36" height="44" fill="currentColor">
                        <path d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 16 1-3 8-10.75 8-16 0-4.42-3.58-8-8-8z"/>
                        <text x="12" y="11" font-size="8" text-anchor="middle" fill="white">📈</text>
                    </svg>
                </div>
            </div>

            <!-- Mint Pin (Own Saved) -->
            <div class="pin pin--mint" style="top: 60%; left: 80%;">
                <div class="pin__icon-container">
                    <svg viewBox="0 0 24 24" width="36" height="44" fill="currentColor">
                        <path d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 16 1-3 8-10.75 8-16 0-4.42-3.58-8-8-8z"/>
                        <text x="12" y="11" font-size="8" text-anchor="middle" fill="white">🔖</text>
                    </svg>
                </div>
            </div>

            <!-- User Location -->
            <div class="user-location" style="top: 50%; left: 40%;"></div>

            <!-- Radar Feature -->
            <div class="radar-container">
                <div class="radar-circle"></div>
                <div class="radar-circle"></div>
                <div class="radar-circle"></div>
                
                <div class="radar-msg">가까운 장소를 저장한 친구를 찾았어요!</div>
                
                <!-- Radar Friends -->
                <div class="radar-friend" style="top: -80px; left: 60px;">
                    <img src="https://i.pravatar.cc/100?u=jihyeon" alt="지현" class="radar-friend__avatar">
                    <span class="radar-friend__name">지현</span>
                </div>
                <div class="radar-friend" style="top: 40px; left: -100px;">
                    <img src="https://i.pravatar.cc/100?u=minsu" alt="민수" class="radar-friend__avatar">
                    <span class="radar-friend__name">민수</span>
                </div>
            </div>

            <!-- Floating Place Card -->
            <div class="floating-card">
                <img src="/Users/admin/.gemini/antigravity/brain/e2f2fde7-5a18-46e6-b7b2-c115122305ae/hongdae_cafe_a_1773304583544.png" alt="홍대 카페 A" class="card__image">
                <div class="card__content">
                    <h3 class="card__title">홍대 카페 A</h3>
                    <p class="card__sub">홍대 · 카페</p>
                    <div class="card__stats">
                        <div class="stat-item stat--mint">⭐ 4.7</div>
                        <div class="stat-item stat--mango">🔥 저장 1,203</div>
                    </div>
                    <div class="card__friends">
                        <div class="friend-group">
                            <img src="https://i.pravatar.cc/100?u=1" class="friend-avatar">
                            <img src="https://i.pravatar.cc/100?u=2" class="friend-avatar">
                            <img src="https://i.pravatar.cc/100?u=3" class="friend-avatar">
                            <img src="https://i.pravatar.cc/100?u=4" class="friend-avatar">
                        </div>
                        <span class="friend-count">+4명</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation Section -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item nav-item--active">
                <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line>
                </svg>
                <span class="nav-item__label">지도</span>
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
                <span class="nav-item__label">저장</span>
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                <span class="nav-item__label">피드</span>
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="nav-item__label">내 정보</span>
            </a>
        </nav>
    </div>
</body>
</html>
