<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Near Pick | 로그인</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app login-app">
        <header class="login-header">
            <div class="logo-container">
                <svg class="app-logo" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 16 1-3 8-10.75 8-16 0-4.42-3.58-8-8-8zm0 11c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/>
                </svg>
            </div>
            <h1 class="login-title">
                나만의 진짜 맛집 리스트<br>지금 바로 시작하세요
            </h1>
            <p class="login-subtitle">로그인하고 내 위치 주변의<br>숨겨진 로컬 맛집을 발견해보세요.</p>
        </header>

        <main class="login-actions">
            <a href="index.html" class="sns-btn sns-btn--kakao">
                <svg class="sns-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 4c-4.97 0-9 3.185-9 7.115 0 2.557 1.707 4.8 4.269 5.968l-1.01 3.692c-.083.303.262.535.53.38l4.223-2.82c.646.103 1.313.16 1.988.16 4.97 0 9-3.185 9-7.115S16.97 4 12 4z"/>
                </svg>
                카카오로 시작하기
            </a>
            
            <a href="index.html" class="sns-btn sns-btn--naver">
                <div class="sns-icon sns-icon--naver-text">N</div>
                네이버로 시작하기
            </a>
            
            <a href="index.html" class="sns-btn sns-btn--apple">
                <svg class="sns-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.05 13.57c-.02-2.31 1.89-3.42 1.98-3.47-1.07-1.57-2.74-1.79-3.34-1.81-1.42-.14-2.77.84-3.51.84-.73 0-1.85-.82-3.03-.8-1.54.02-2.96.9-3.75 2.27-1.61 2.78-.41 6.9 1.15 9.16.76 1.11 1.68 2.35 2.89 2.31 1.16-.04 1.6-.74 3.01-.74 1.41 0 1.83.74 3.03.71 1.23-.02 2.02-1.12 2.78-2.23.88-1.28 1.24-2.52 1.26-2.59-.02-.01-2.43-.93-2.45-3.65zM14.62 7.12c.64-.77 1.07-1.85.95-2.92-1.01.04-2.14.63-2.79 1.4-.58.68-1.09 1.8-.95 2.85 1.11.09 2.14-.56 2.79-1.33z"/>
                </svg>
                Apple로 시작하기
            </a>

            <a href="index.html" class="sns-btn sns-btn--google">
                <svg class="sns-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google로 시작하기
            </a>
        </main>

        <footer class="login-footer">
            <p class="login-policy">
                로그인 시 <a href="#">이용약관</a>과 <a href="#">개인정보 처리방침</a>에 동의하게 됩니다.
            </p>
        </footer>
    </div>
</body>
</html>
