<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Near Pick | 트렌디한 장소 추천 지도</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/main.css" />
    <!-- Google Fonts for premium feel -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__top">
          <button class="header__menu-btn" aria-label="메뉴 열기">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="search-bar">
            <svg
              class="search-bar__icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <span class="search-bar__text">지역, 장소, 카테고리 검색</span>
          </div>
          <div class="header__profile">
            <img src="https://via.placeholder.com/32" alt="프로필" />
          </div>
        </div>

        <nav class="filters" aria-label="장소 필터">
          <button class="chip chip--active-friend">
            <span>🔥</span> 친구 추천
          </button>
          <button class="chip">
            <img src="https://via.placeholder.com/14x14?text=NK" alt="N+K" />
            전체 사용자
          </button>
          <button class="chip chip--influencer">
            <span>✨</span> 인플루언서 픽
          </button>
        </nav>
      </header>

      <main class="main-content">
        <section class="map" aria-label="지도 영역">
          <div class="map-placeholder"></div>

          <!-- Modern Pins (Mock SVGs) -->
          <div class="pin pin--friend">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 16 1-3 8-10.75 8-16 0-4.42-3.58-8-8-8zm0 11c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"
              />
            </svg>
          </div>
          <div class="pin pin--popular">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 16 1-3 8-10.75 8-16 0-4.42-3.58-8-8-8zm0 11c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"
              />
            </svg>
          </div>
          <div class="pin pin--influencer">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 16 1-3 8-10.75 8-16 0-4.42-3.58-8-8-8zm0 11c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"
              />
            </svg>
          </div>
        </section>

        <!-- Bottom Sheet -->
        <section class="content-sheet">
          <div class="section">
            <div class="section__header">
              <h2 class="section__title">지금 핫한 맛집 추천</h2>
            </div>
            <div class="hot-places">
              <article class="card card--hot">
                <div
                  class="card__image"
                  style="background: linear-gradient(135deg, #ff6b57, #ffc145)"
                ></div>
                <div class="card__info">
                  <h3 class="card__name">아로남 맛집</h3>
                  <div class="card__meta">합정 · 일식 | ⭐ 4.9</div>
                </div>
              </article>
              <article class="card card--hot">
                <div class="card__image"></div>
                <div class="card__info">
                  <h3 class="card__name">야지말고 잘고 기...</h3>
                  <div class="card__meta">망원 · 카페 | ⭐ 4.8</div>
                </div>
              </article>
              <article class="card card--hot">
                <div class="card__image"></div>
                <div class="card__info">
                  <h3 class="card__name">마다오 가방</h3>
                  <div class="card__meta">성수 · 한식 | ⭐ 4.0</div>
                </div>
              </article>
            </div>
          </div>

          <div class="section">
            <div class="section__header">
              <h2 class="section__title">친구들이 저장한 맛집</h2>
            </div>
            <!-- Vertical List Placeholder -->
            <div class="friend-places" style="padding: 0 16px">
              <article
                class="card card--vertical"
                style="
                  display: flex;
                  gap: 12px;
                  margin-bottom: 12px;
                  align-items: center;
                "
              >
                <div
                  class="card__image"
                  style="width: 80px; height: 80px; border-radius: 12px"
                ></div>
                <div class="card__info">
                  <h3 class="card__name" style="font-size: 16px">
                    을지로 미팅룸
                  </h3>
                  <div class="card__meta">을지로 · 파스타</div>
                  <div
                    class="card__avatars"
                    style="display: flex; margin-top: 8px"
                  >
                    <div
                      style="
                        width: 24px;
                        height: 24px;
                        border-radius: 50%;
                        background: #ccc;
                        border: 2px solid white;
                      "
                    ></div>
                    <div
                      style="
                        width: 24px;
                        height: 24px;
                        border-radius: 50%;
                        background: #999;
                        border: 2px solid white;
                        margin-left: -8px;
                      "
                    ></div>
                    <span
                      style="
                        font-size: 11px;
                        color: #666;
                        margin-left: 4px;
                        align-self: center;
                      "
                      >친구들</span
                    >
                  </div>
                </div>
              </article>
            </div>
          </div>
        </section>
      </main>

      <nav class="tab-bar">
        <a href="#" class="tab-bar__item tab-bar__item--active">
          <span class="tab-bar__icon">🗺️</span>
          <span class="tab-bar__label">지도</span>
        </a>
        <a href="#" class="tab-bar__item">
          <span class="tab-bar__icon">🔖</span>
          <span class="tab-bar__label">저장</span>
        </a>
        <button class="fab" aria-label="추가">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <a href="#" class="tab-bar__item">
          <span class="tab-bar__icon">🎴</span>
          <span class="tab-bar__label">피드</span>
        </a>
        <a href="#" class="tab-bar__item">
          <span class="tab-bar__icon">👤</span>
          <span class="tab-bar__label">프로필</span>
        </a>
      </nav>
    </div>
  </body>
</html>
